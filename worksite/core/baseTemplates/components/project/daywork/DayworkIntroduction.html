<div class="items-center">
    <div class="card w-96 bg-base-100 shadow-sm">
        <div class="card-body">
            <span class="badge badge-xs badge-secondary">Project Ready</span>
            <div class="flex justify-between">
                <p class="text-sm text-gray-500 font-semibold">You need to avtivate this Project to start managing Days Work.
                </p>

            </div>
            <ul class="mt-6 flex flex-col gap-2 text-xs">
                <li>
                    <span class="fa fa-check size-4 me-2 mx-1 done">

                    </span>
                    <span>Regulate the assignment of Daily Work</span>
                </li>
                <li>
                    <span class="fa fa-check size-4 me-2 mx-1 inline-block done" fill="none">

                    </span>
                    <span>Record Sign on times and Sign off times</span>
                </li>
                <li>
                    <span class="fa fa-check size-4 me-2 mx-1 inline-block done" fill="none">

                    </span>
                    <span>Search and filter work periods</span>
                </li>
                <li>
                    <span class="fa fa-check size-4 me-2 mx-1 inline-block done" fill="none"></span>
                    <span>Process Days Worker Renumeration </span>
                </li>
                <li>
                    <span class="fa fa-check size-4 me-2 mx-1 inline-block done" fill="none"></span>
                    <span>Generate Activity Reports </span>
                </li>                             
                
                <li>
                    <span class="fa fa-check size-4 me-2 mx-1 inline-block done" fill="none">

                    </span>
                    <span class="line-underline">Extendable Features</span>
                </li>
            </ul>
            <div class="mt-6">
                <button class="btn btn-primary btn-block tooltip tooltip-info" data-tip="Activate this Project."
                    hx-post="/project/{{ project._id }}/readystate/activate" hx-target="#main-display"
                    hx-confirm="You are about to Start this Project's activities.">Activate Project</button>
            </div>
        </div>
    </div>
</div>
