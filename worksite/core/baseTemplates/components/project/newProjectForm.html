<form 
    class="form" 
    hx-post="/project/i/save/i"
    hx-target="#left-bar"
    >
    <div uk-grid>
        
        <div class="uk-width-1-3@m">
            <fieldset class="fieldset">
                <legend class="fieldset-legend">Project Details</legend>
                
            </fieldset>
            <fieldset class="fieldset">
                <label class="label">
                    <span class="fieldset-legend">Date</span>
                    <input class="input input-xs" id="date" type="date" placeholder="Project Creation Date" name="date">
                    </label>
            </fieldset>
        
            
            <fieldset class="fieldset">
                <label class="label">
                    <span class="fieldset-legend">Project Name</span>
                    <input class="input input-xs" id="name" type="text" placeholder="Project Name" name="name">
                    </label>
            </fieldset>
            
            <fieldset class="fieldset">
                <label class="label">
                <legend class="fieldset-legend">Category</legend>
                <select class="select select-xs validator" name="category" required >
                    <option disabled selected>Category</option>
                    <option>residential</option>
                    <option>commercial</option>
                    <option>government</option>        
                    <option>charity</option>
                </select>
                </label>
            </fieldset>
            <fieldset class="fieldset">
                <label class="label">
                <legend class="fieldset-legend">Standard</legend>
                <select class="select select-xs validator" name="standard" required >
                    <option disabled selected>Standard</option>
                    <option>imperial</option>
                    <option>metric</option>
                    
                </select>
                </label>
            
            </fieldset>
            <fieldset class="fieldset">
                <label class="label">
                    <legend class="fieldset-legend">Owner/Client</legend>
                    <input type="text" class="input input-xs validator" name="owner" placeholder="Owner's Name" required />
                </label>
            
            </fieldset>
            <fieldset class="fieldset">
                <label class="label">
                    <legend class="fieldset-legend">Lead</legend>
                    <input type="text" class="input input-xs validator" name="lead" placeholder="Leader" required />
                </label>
            
            </fieldset>
        </div>
        <div class="uk-width-1-3@m">
            <fieldset class="fieldset">
                <legend class="fieldset-legend">Address Details</legend>
                
            </fieldset>
            <fieldset class="fieldset">
                <label class="label">
                    <legend class="fieldset-legend">Lot</legend>
                    <input type="text" class="input input-xs" name="lot" placeholder="Lot"  />
                </label>
            </fieldset>
            <fieldset class="fieldset">
                <label class="label">
                    <legend class="fieldset-legend">Street</legend>
                    <input type="text" class="input input-xs" name="street" placeholder="Street" />
                </label>
            </fieldset>
            <fieldset class="fieldset">
                <label class="label" for="form-stacked-text">
                    <legend class="fieldset-legend">Town</legend>                
                    <input class="input input-xs" type="text" placeholder="Town" name="town">
                </label>
            </fieldset>
            
            <fieldset class="fieldset">
                <label class="label" for="form-stacked-text">
                    <legend class="fieldset-legend">City or Parish</legend>                
                    <input class="input input-xs" type="text" placeholder="City/ Parish" name="city_parish">
                </label>
            </fieldset>
            <fieldset class="fieldset">
                <label class="label" for="form-stacked-text">
                    <legend class="fieldset-legend">Country</legend>                
                    <input class="input input-xs" type="text" placeholder="Country" name="country">
                </label>  
            </fieldset>
            <fieldset class="fieldset">
                <div class="flex flex-row">
                    <input class="btn btn-primary btn-xs" type="submit" value="Create Project" >
                <button class="btn btn-xs mx-2">Cancel Project</button>
                
                </div>
            
            </fieldset>
        </div>
    </div>


</form>
