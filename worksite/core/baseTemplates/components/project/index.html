<div id="project_base">

<div class="container mx-auto p-4">
    <h1 class="text-xl font-bold mb-4 flex flex-row"><span><img src="/static/imgs/icons/favicon.svg" alt="Favicon"
                width="35px"> </span>Welcome to Worksite Projects</h1>
    <p class="text-lg text-gray-700">Your construction management platform.</p>
    <div class="mt-6">
        <h2 class="text-2xl font-semibold mb-2">Your Projects</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
            {% for project in projects %}
            <div class="bg-white rounded-lg shadow-md p-4">
                <h3 class="text-xl font-bold mb-2">{{ project.name }}</h3>
                <p class="text-xs text-gray-500 mb-2">{{ project.description }}</p>
                <a hx-get="/project/project/{{ project.id }}" hx-target="#project_base" class="text-blue-500 hover:underline cursor-pointer">View Details</a>
            </div>
            {% endfor %}
        </div>
</div>
</div>
