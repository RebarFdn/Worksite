{% if project.owner.address %}
<form id="project-owner-address-form" hx-post="/project/{{ project._id }}/owner/address" hx-target="#project-owner-address"
    class="space-y-4">
    <ul>

        {% for key,val in project.owner.address.items() %}
        <li>
            <strong>{{key}}.</strong>
            {% if val %}
            {{ val }}
            {% else %}

            <div class="flex flex-row">
                <input type="text" placeholder="{{key}}" name="{{key}}" class="input input-accent input-xs" />
                <button type="submit" class="btn btn-xs btn-primary ml-2">Update</button>
            </div>
            {% endif %}
        </li>
        {% endfor %}
    </ul>
</form>
{% endif %}
