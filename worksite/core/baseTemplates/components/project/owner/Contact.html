
{% if project.owner.contact %}
<form id="project-owner-contact-form" hx-post="/project/{{ project._id }}/owner/contact"
    hx-target="#project-owner-contact" class="space-y-4">
    <ul>

        {% for key,val in project.owner.contact.items() %}
        <li>
            <strong>{{key}}.</strong>
            {% if val %}
            {{ val }}
            {% else %}

            <div class="flex flex-row">
                <input type="text" placeholder="{{key}}" name="{{key}}" class="input input-accent input-xs" />
                <button type="submit" class="btn btn-xs btn-primary ml-2">Update</button>
            </div>
            {% endif %}
        </li>
        {% endfor %}
    </ul>
</form>
{% else %}
<form id="project-owner-contact-form" hx-post="/project/{{ project._id }}/owner/contact"
    hx-target="#project-owner-contact" class="space-y-4">
    <ul>       
        <li>
            <strong>Tel..</strong>          

            <div class="flex flex-row">
                <input type="text" placeholder="Telephone no." name="tel" class="input input-accent input-xs" />
                <button type="submit" class="btn btn-xs btn-primary ml-2">Update</button>
            </div>
            
        </li>
        <li>
            <strong>Mobile..</strong>
        
            <div class="flex flex-row">
                <input type="text" placeholder="Mobile Number" name="mobile" class="input input-accent input-xs" />
                <button type="submit" class="btn btn-xs btn-primary ml-2">Update</button>
            </div>
        
        </li>
        <li>
            <strong>Email..</strong>          

            <div class="flex flex-row">
                <input type="text" placeholder="Email Address" name="email" class="input input-accent input-xs" />
                <button type="submit" class="btn btn-xs btn-primary ml-2">Update</button>
            </div>
        </li>   
        <li>
            <strong>Watsapp..</strong>
            
            <div class="flex flex-row">
                <input type="text" placeholder="Watsapp Number" name="watsapp" class="input input-accent input-xs" />
                <button type="submit" class="btn btn-xs btn-primary ml-2">Update</button>
            </div>

        </li>
    </ul>
</form>
{% endif %}
