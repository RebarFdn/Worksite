
<ul class="menu  menu-horizontal bg-base-200 rounded-box">
    <li>
        <a>
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 bill" fill="none" viewBox="0 0 24 24"
                stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
            </svg>
            Job Bill
            <span class="badge badge-sm bill">{{job.tasks | length }} items</span>
        </a>
    </li>
    <li>
        <span>
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 bill" fill="none" viewBox="0 0 24 24"
                stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
            <button class="btn btn-ghost btn-xs bill" popovertarget="popover-3" style="anchor-name:--anchor-2">
                Filter Tasks
            </button>
            <ul class="dropdown menu w-52 rounded-box bg-base-100 shadow-sm" popover id="popover-3"
                style="position-anchor:--anchor-2">
                <li><a disabled>Job category</a></li>
                <li><a hx-get="/project/{{project._id}}/jobfilter/{{ job.id }}-all-bill" hx-target="#job_bill_index"
                        hx-trigger="click">
                        <span class="text-xs bg-base-200 flex flex-row">All </span>
                    </a>
                </li>
                {% for item in job.filter %}
                <li><a hx-get="/project/{{project._id}}/jobfilter/{{ job.id }}-{{item}}-bill" hx-target="#job_bill_index"  hx-trigger="click">
                        <span class="text-xs bg-base-200 flex flex-row">{{ item  }} </span>
                    </a>
                </li>
                {% endfor %} 
            </ul>
        </span>
    </li>

    <li>
        <a 
        hx-get="/project/{{job.project_id}}/printjob_metric/{{job.id}}" 
        hx-target="#message"
        >
            
            <span class="fa fa-print bill"></span>
            Print Bill Metric
        </a>
    </li>
    <li>
        <a
        hx-get="/project/{{job.project_id}}/printjob_imperial/{{job.id}}"
        hx-target="#message">
    
            <span class="fa fa-print bill"></span>
            Print Bill Imperial 
        </a>
    </li>
</ul>
<div id="job_bill_index" class="text-sm uk-overflow-auto">
    {% include '/components/project/job/bill/BillIndex.html' %}
</div>

<div id="edit-task-modal" class="uk-modal-container" uk-modal>
    <div class="uk-modal-dialog uk-modal-body">
        <button class="uk-modal-close-default" type="button" uk-close></button>
        <h2 class="uk-modal-title">Editing Task<h2>
    </div>
</div>
