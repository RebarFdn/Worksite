<form 
    hx-post="/employee/i/i/save"
    hx-target="#main-display"
    hx-confirm="You are about to store sensitive information permanently on the system. This action is irreversible"
    >
    <div uk-grid>
        <div class="uk-width-auto@m"></div>
        <div class="uk-width-1-3@m">
            <fieldset class="fieldset">
                <legend class="fieldset-legend">The Employee's name</legend>
                <input type="text" class="input input-xs validator" name="name" placeholder="Name" required />
    
            </fieldset>
            <fieldset class="fieldset">
                <legend class="fieldset-legend">Employee's Alias</legend>
                <input type="text" class="input input-xs" name="oc" placeholder="AKA" />
    
            </fieldset>
            <fieldset>
                <legend class="fieldset-legend">Gender</legend>
                <select class="select select-xs" name="sex">
                    <option disabled selected>Sex</option>
                    <option>Male</option>
                    <option>Female</option>
                    <option>Machine</option>
                </select>
            </fieldset>
            <fieldset class="fieldset">
                <legend class="fieldset-legend">Date Of Birth</legend>
                <input type="date" class="input input-xs validator" name="dob" placeholder="Date Of Birth" />
            
            </fieldset>
            <fieldset class="fieldset">
                <legend class="fieldset-legend">Height</legend>
                <input type="number" class="input input-xs validator" name="height" placeholder="Height" />
            
            </fieldset>
            <fieldset class="fieldset">
                <legend class="fieldset-legend">Identity</legend>
                <input type="text"  class="input input-xs validator" name="identity" placeholder="Identity" />            
            </fieldset>
            <fieldset>
                <legend class="fieldset-legend">Id Type</legend>
                <select class="select select-xs" name="id_type">
                    <option disabled selected>Id Type</option>
                    <option>Passport</option>
                    <option>Driver's License</option>
                    <option>National</option>
                    <option>Other</option>
                </select>
            </fieldset>
            


           
        </div>
        <div class="uk-width-expand@m">
            <fieldset class="fieldset">
                <legend class="fieldset-legend">TRN</legend>
                <input type="text" class="input input-xs validator" name="trn" placeholder="TRN" />
            </fieldset>
            <fieldset class="fieldset">
                <legend class="fieldset-legend">Occupation</legend>
                <select class="select select-xs validator" name="occupation">
                    <option disabled selected>Occupation</option>
                    {% for item in occupation_index %}
                        <option>{{ item }}</option>
                    {% endfor %}
                </select>
            </fieldset>
            <fieldset class="fieldset">
                <legend class="fieldset-legend">Rating</legend>
                <input type="text" class="input input-xs validator" name="rating" placeholder="Rating" />
            </fieldset>
            <details class="collapse bg-base-100 border border-base-300" name="my-accordion-det-1">
                <summary class="collapse-title font-semibold">Address</summary>
                <div class="collapse-content text-sm">
                    <div class="flex flex-col">
                        <input type="text" class="input input-xs" name="lot" placeholder="Lot" />
                        <input type="text" class="input input-xs" name="street" placeholder="Street" />
                        <input type="text" class="input input-xs" name="town" placeholder="Town" />
                        <input type="text" class="input input-xs" name="city_parish" placeholder="City/Parish" />
                        <input type="text" class="input input-xs" name="country" placeholder="Country" />
    
                    </div>
                </div>
            </details>
            <details class="collapse bg-base-100 border border-base-300" name="my-accordion-det-1">
                <summary class="collapse-title font-semibold">Contact</summary>
                <div class="collapse-content text-sm">
                    <div class="flex flex-col">
                        <input type="text" class="input input-xs" name="tel" placeholder="Tel" />
                        <input type="text" class="input input-xs" name="mobile" placeholder="Mobile" />
                        <input type="text" class="input input-xs" name="watsapp" placeholder="Watsapp" />
                        <input type="text" class="input input-xs" name="email" placeholder="Email" />
    
                    </div>
                </div>
            </details>
            <details class="collapse bg-base-100 border border-base-300" name="my-accordion-det-1">
                <summary class="collapse-title font-semibold">Banking Info</summary>
                <div class="collapse-content text-sm">
                    <div class="flex flex-col">
                        <input type="text" class="input input-xs" name="bank_name" placeholder="Bank Name" />
                        <input type="text" class="input input-xs" name="branch" placeholder="Branch" />
                        <input type="text" class="input input-xs" name="account_type" placeholder="Account Type" />
                        <input type="text" class="input input-xs" name="account" placeholder="Account Number" />
    
                    </div>
                </div>
            </details>
            <details class="collapse bg-base-100 border border-base-300" name="my-accordion-det-1">
                <summary class="collapse-title font-semibold">Next Of Kin</summary>
                <div class="collapse-content text-sm">
                    <div class="flex flex-col">
                        <fieldset class="fieldset">
                            <legend class="fieldset-legend">Name</legend>
                            <input type="text" class="input input-xs validator" name="kin_name" placeholder="Kin Name" /> 
                            <input type="text" class="input input-xs validator" name="kin_relation" placeholder="Relation" />
                        </fieldset>
                        <fieldset class="fieldset">
                            <legend class="fieldset-legend">Contact</legend>
                            <input type="text" class="input input-xs validator" name="kin_tel" placeholder="Kin Contact" /> 
                        </fieldset>
            
                    </div>
                </div>
            </details>
            <fieldset class="fieldset">
                <button class="btn btn-secondary btn-sm " type="submit">Submit
                </button>
            </fieldset>
        </div>
    </div>
    
</form>
