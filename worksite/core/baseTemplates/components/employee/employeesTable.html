<table id="employees-table" class="table table-sm">
    
    <thead>
        <tr>
            <th></th>
            <th>Id</th>
            <th>Name </th>
            <th>Oc</th>
            <th>Occupation</th>
            <th>Rating</th>
            <th>manage</th>
        </tr>
    </thead>
    <tbody>
        {% for worker in workers %}
        <tr>
            <td class="text-xs">
                <div><img class="size-10 rounded-box" src="{{ worker.value.imgurl }}" alt="{{worker.value.oc}}" /></div>
            </td>
            <td class="px-4 py-2 whitespace-wrap text-sm text-gray-800 dark:text-gray-200">{{ worker.id }}</td>
            <td class="px-4 py-2 whitespace-wrap text-sm text-gray-800 dark:text-gray-200 tooltip tooltip-info cursor-pointer" data-tip="Go to employee {{worker.value.name}}'s Page"
                hx-get="/employee/{{worker.id}}" hx-target="#app" hx-trigger="click">{{ worker.value.name
                }}</td>
            <td class="px-4 py-2 whitespace-wrap text-sm text-gray-800 dark:text-gray-200">{{ worker.value.oc }}</td>
            <td class="px-4 py-2 whitespace-wrap text-sm text-gray-800 dark:text-gray-200">
                {{ worker.value.occupation }}
            </td>
            <td class="tooltip tooltip-info" data-tip="Click to activate Location and distance tracking">
               
                <div class="rating rating-xs">
                    {% for rating in range(worker.value.rating|int) %}
                    <div class="mask mask-star worker" aria-label="{{ rating + 1 }} star"></div>
                    {% endfor %}
                </div>
            </td>
            <td class="px-4 py-2 whitespace-wrap text-sm text-gray-800 dark:text-gray-200">manage</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
