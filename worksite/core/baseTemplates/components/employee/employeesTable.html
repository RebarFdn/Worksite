<!DOCTYPE html>
<table 
    id="employees-table" 
    class="table-sm font-medium text-gray-800 m-2"
    data-order="[[ 1, &quot;asc&quot; ]]"
    data-page-length="25"
    >
    <thead>
        <tr>
            <th></th>
            <th>Id</th>
            <th>Name </th>
            <th>Oc</th>
            <th>Occupation</th>
            <th>Rating</th>
            <th>manage</th>
        </tr>
    </thead>
    <tbody>
        {% for worker in workers %}
        <tr class="bg-base-50 shadow-md border border-gray-100 rounded-sm p-2 my-2">
            <td>
                <div><img class="size-10 rounded-box" src="{{ worker.value.imgurl }}" alt="{{worker.value.oc}}"></div>
            </td>
            <td>{{ worker.id }}</td>
            <td ><span class="tooltip tooltip-info cursor-pointer" data-tip="Go to employee {{worker.value.name}}'s Page"
                hx-get="/employee/{{worker.id}}" hx-target="#app" hx-trigger="click">{{ worker.value.name
                }}</span>
            </td>
            <td><div class="text-md text-gray-800 text-center font-semibold bg-amber-100 p-2 rounded-lg">{{ worker.value.oc }}</div></td>
            <td>
                {{ worker.value.occupation }}
            </td>
            <td class="tooltip tooltip-info" data-tip="Click to activate Location and distance tracking">
                <div class="rating rating-xs worker">
                    {% for rating in range(worker.value.rating|int) %}
                    <span class="mask mask-star worker" aria-label="{{ rating + 1 }} star"></span>
                    {% endfor %}
                </div>
            </td>
            <td>manage</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
