<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site Dropbox</title>   
    <link href="/static/css/site.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/uikit/css/uikit.min.css" />
    <link rel="stylesheet" href="/static/fontawesome/css/fontawesome.css" />
    
    <link rel="stylesheet" href="/static/fontawesome/css/solid.css" />
    
    <script src="/static/node_modules/htmx.org/dist/htmx.min.js"></script>
    <script src="/static/uikit/js/uikit.min.js"></script>
   
    
   
</head>
<body class="bg-gray-100">
    <header>
        <p class="text-lg  text-center font-bold my-5">
            {% block header %}{% endblock %}
        </p>
    </header>
    <div class="text-center items-center">
        <div id="message"></div>
        {% block content %}{% endblock %}

    </div>
    
    <footer>
        {% block footer %} {% endblock %}
        <p class="text-xs text-teal-600 m-5">Request Url: {{ request.headers['x-forwarded-for'] }}</p>
    </footer>

   
</body>
</html>
